name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 74.208.146.8
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "index.html,blog.html,nyc-logo.png,nyc-logo-sm.png"
          target: /var/www/paywith.nyc/

      - name: Deploy blog directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.146.8
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /var/www/paywith.nyc/blog
            cp /var/www/paywith.nyc/blog.html /var/www/paywith.nyc/blog/index.html
            echo "Deploy complete: $(date)"
