server {
    listen 80;
    listen [::]:80;
    server_name paywith.nyc www.paywith.nyc;

    # Redirect all HTTP to HTTPS (after certbot runs)
    location / {
        return 301 https://$host$request_uri;
    }

    # Allow certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/paywith.nyc;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name paywith.nyc www.paywith.nyc;

    root /var/www/paywith.nyc;
    index index.html;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/paywith.nyc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paywith.nyc/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            DENY always;
    add_header X-Content-Type-Options     nosniff    always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(css|js)$ {
        expires 1M;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

# ---------------------------------------------------------------------------
# Rosetta API — https://rosetta.paywith.nyc
# Reverse proxy to the mesh-newyorkcoin Docker container on localhost:8081.
# The container must be started with -p 127.0.0.1:8081:8081 so that Docker
# does NOT expose port 8081 publicly (Docker bypasses UFW/iptables by default).
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name rosetta.paywith.nyc;

    # Redirect HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Allow certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/paywith.nyc;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rosetta.paywith.nyc;

    # SSL — obtain with:
    #   certbot certonly --nginx -d rosetta.paywith.nyc
    ssl_certificate     /etc/letsencrypt/live/rosetta.paywith.nyc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rosetta.paywith.nyc/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options     nosniff    always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    # Rosetta is a JSON API — no framing or browser access needed
    add_header X-Frame-Options            DENY always;
    add_header Content-Security-Policy    "default-src 'none'" always;

    # Proxy to mesh-newyorkcoin on loopback only
    location / {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Rosetta responses can be large (block data)
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_buffers       16 16k;
        proxy_buffer_size   32k;

        # Only allow POST (all Rosetta endpoints use POST)
        limit_except POST {
            deny all;
        }
    }
}
