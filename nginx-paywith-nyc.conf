server {
    listen 80;
    listen [::]:80;
    server_name paywith.nyc www.paywith.nyc;

    # Redirect all HTTP to HTTPS (after certbot runs)
    location / {
        return 301 https://$host$request_uri;
    }

    # Allow certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/paywith.nyc;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name paywith.nyc www.paywith.nyc;

    root /var/www/paywith.nyc;
    index index.html;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/paywith.nyc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paywith.nyc/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            SAMEORIGIN always;
    add_header X-Content-Type-Options     nosniff    always;
    add_header Referrer-Policy            "no-referrer-when-downgrade" always;
    add_header X-XSS-Protection           "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(css|js)$ {
        expires 1M;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
