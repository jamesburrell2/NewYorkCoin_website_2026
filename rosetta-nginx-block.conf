# ---------------------------------------------------------------------------
# Rosetta API — https://rosetta.paywith.nyc
# Reverse proxy to mesh-newyorkcoin Docker container on localhost:8081.
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name rosetta.paywith.nyc;
    location / { return 301 https://$host$request_uri; }
    location /.well-known/acme-challenge/ { root /var/www/paywith.nyc; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rosetta.paywith.nyc;

    ssl_certificate     /etc/letsencrypt/live/rosetta.paywith.nyc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rosetta.paywith.nyc/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options     nosniff    always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options            DENY always;
    add_header Content-Security-Policy    "default-src 'none'" always;

    location / {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_buffers       16 16k;
        proxy_buffer_size   32k;
        limit_except POST { deny all; }
    }
}
